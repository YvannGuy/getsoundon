version: "3.9"

services:
  db:
    image: postgres:16
    container_name: getsoundon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: getsoundon
    ports:
      - "54329:5432"
    volumes:
      - getsoundon_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d getsoundon"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: getsoundon-adminer
    restart: unless-stopped
    ports:
      - "8089:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  getsoundon_pgdata:
